name: PMD Lint

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
    - "**/*.java"
    - "**/*.xml"
    - "**/*.properties"
    - "mvnw"
    - "mvnw.cmd"

  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
    - "**/*.java"
    - "**/*.xml"
    - "**/*.properties"
    - "mvnw"
    - "mvnw.cmd"

jobs:
  pmd:
    name: PMD Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PMD
        env:
          POSTGRESQL_DB_URL: jdbc:postgresql://localhost:5432/testdb
          POSTGRESQL_DB_USER: testuser
          POSTGRESQL_DB_PASSWORD: testpassword
        run: mvn pmd:check --no-transfer-progress

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 7