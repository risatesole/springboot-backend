name: API Contract Tests

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
    - "**/*.java"
    - "**/*.xml"
    - "**/*.properties"
    - "mvnw"
    - "mvnw.cmd"

  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
    - "**/*.java"
    - "**/*.xml"
    - "**/*.properties"
    - "mvnw"
    - "mvnw.cmd"

jobs:
  contract:
    name: Contract Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Spring Boot app
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Start Spring Boot app
        env:
          POSTGRESQL_DB_URL: jdbc:postgresql://localhost:5432/testdb
          POSTGRESQL_DB_USER: testuser
          POSTGRESQL_DB_PASSWORD: testpassword
        run: |
          java -jar target/*.jar &
          echo $! > spring-boot.pid

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health | grep -q "ok"; then
              echo "App is up!"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, waiting 3s..."
            sleep 3
          done
          echo "App failed to start in time"
          exit 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: .github/workflows/test_api_contract/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: .github/workflows/test_api_contract
        run: pnpm install --ignore-workspace

      - name: Run contract tests
        working-directory: .github/workflows/test_api_contract
        run: pnpm --ignore-workspace test:contract

      - name: Stop Spring Boot app
        if: always()
        run: |
          if [ -f spring-boot.pid ]; then
            kill $(cat spring-boot.pid) || true
          fi
